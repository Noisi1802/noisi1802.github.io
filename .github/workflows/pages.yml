name: Build and Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Patch
        env:
          AB3A9A: ${{ secrets.AB3A9A }}
          BA67A4: ${{ secrets.BA67A4 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          k1 = os.environ.get('AB3A9A', '')
          k2 = os.environ.get('BA67A4', '')
          idx = pathlib.Path('index.html')
          txt = idx.read_text(encoding='utf-8')
          out = txt.replace('<!-- fe4571bbc72a0331886d -->', k1) if k1 else txt
          out = out.replace('<!-- 8f2a766f4721281a3b579fb757e05c -->', k2) if k2 else out
          if out == txt and (k1 or k2):
              sys.exit(1)
          if out != txt:
              idx.write_text(out, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
